<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oficio Taller — Studio OS</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      overflow: hidden;
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      font-size: 11px;
    }

    /* Top bar */
    #topbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 40px;
      background: #080808;
      border-bottom: 1px solid #1f1f1f;
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    #topbar .brand {
      color: #4ade80;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      font-weight: 400;
    }

    #topbar .sep {
      color: #222;
      margin: 0 10px;
    }

    #breadcrumb {
      color: #888;
      font-size: 10px;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
    }

    #topbar .studio-os {
      color: #222;
      font-size: 9px;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      margin-left: auto;
      letter-spacing: 0.08em;
    }

    /* Sidebar */
    #sidebar {
      position: fixed;
      top: 40px;
      left: 0;
      width: 200px;
      height: calc(100vh - 40px);
      overflow-y: auto;
      background: #080808;
      border-right: 1px solid #1f1f1f;
      z-index: 99;
      display: flex;
      flex-direction: column;
    }

    #sidebar-content {
      flex: 1;
    }

    .nav-group-label {
      color: #2a2a2a;
      text-transform: uppercase;
      font-size: 9px;
      letter-spacing: 0.12em;
      padding: 16px 16px 6px;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      user-select: none;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      cursor: pointer;
      color: #555;
      font-size: 11px;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      border-left: 3px solid transparent;
      transition: color 0.1s, background 0.1s;
      user-select: none;
    }

    .nav-item:hover {
      color: #aaa;
      background: #0d0d0d;
    }

    .nav-item.active {
      color: #f5f5f5;
      background: #0f1a0f;
      border-left: 3px solid #4ade80;
    }

    .nav-item .dot {
      color: #333;
      font-size: 10px;
      flex-shrink: 0;
    }

    .nav-item.active .dot {
      color: #4ade80;
    }

    .nav-item .label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Sidebar footer */
    #sidebar-footer {
      color: #222;
      font-size: 9px;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace;
      padding: 12px 16px;
      border-top: 1px solid #111;
      flex-shrink: 0;
    }

    /* iframe */
    #frame {
      position: fixed;
      top: 40px;
      left: 200px;
      width: calc(100vw - 200px);
      height: calc(100vh - 40px);
      border: none;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="topbar">
    <span class="brand">OFICIO TALLER</span>
    <span class="sep">|</span>
    <span id="breadcrumb">Pipeline Flowchart</span>
    <span class="studio-os">STUDIO OS</span>
  </div>

  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-content">

      <div class="nav-group-label">SYSTEM</div>

      <div class="nav-item" data-hash="#pipeline" onclick="navigate('#pipeline')">
        <span class="dot">○</span>
        <span class="label">Pipeline Flowchart</span>
      </div>
      <div class="nav-item" data-hash="#agent-flow" onclick="navigate('#agent-flow')">
        <span class="dot">○</span>
        <span class="label">Agent Flow Chart</span>
      </div>
      <div class="nav-item" data-hash="#agent-system" onclick="navigate('#agent-system')">
        <span class="dot">○</span>
        <span class="label">Agent System Flow</span>
      </div>
      <div class="nav-item" data-hash="#data-layer" onclick="navigate('#data-layer')">
        <span class="dot">○</span>
        <span class="label">Data Layer Architecture</span>
      </div>

      <div class="nav-group-label">PROJECTS</div>

      <div class="nav-item" data-hash="#history" onclick="navigate('#history')">
        <span class="dot">○</span>
        <span class="label">Project History</span>
      </div>
      <div class="nav-item" data-hash="#timeline" onclick="navigate('#timeline')">
        <span class="dot">○</span>
        <span class="label">Timeline Dashboard</span>
      </div>
      <div class="nav-item" data-hash="#project-timeline" onclick="navigate('#project-timeline')">
        <span class="dot">○</span>
        <span class="label">Project Timeline</span>
      </div>

      <div class="nav-group-label">FINANCE</div>

      <div class="nav-item" data-hash="#financial" onclick="navigate('#financial')">
        <span class="dot">○</span>
        <span class="label">Financial Model</span>
      </div>

    </div>

    <div id="sidebar-footer">version: 1.0 · 2026</div>
  </nav>

  <!-- Main iframe -->
  <iframe id="frame" src="" title="Studio Dashboard"></iframe>

  <script>
    const ROUTES = {
      '#pipeline':         { file: 'pipeline-flowchart.html',      label: 'Pipeline Flowchart' },
      '#agent-flow':       { file: 'agent-flow-chart.html',        label: 'Agent Flow Chart' },
      '#agent-system':     { file: 'agent-system-flow.html',       label: 'Agent System Flow' },
      '#data-layer':       { file: 'data-layer.html',              label: 'Data Layer Architecture' },
      '#history':          { file: 'project-history.html',         label: 'Project History' },
      '#timeline':         { file: 'timeline-dashboard.html',      label: 'Timeline Dashboard' },
      '#project-timeline': { file: 'tc-009-project-timeline.html', label: 'Project Timeline' },
      '#financial':        { file: 'financial-dashboard.html',     label: 'Financial Model' },
    };

    function navigate(hash) {
      const route = ROUTES[hash] || ROUTES['#pipeline'];
      const h = route === ROUTES['#pipeline'] && !ROUTES[hash] ? '#pipeline' : hash;

      // Update iframe src
      document.getElementById('frame').src = route.file;

      // Update breadcrumb
      document.getElementById('breadcrumb').textContent = route.label;

      // Update active nav items
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === (ROUTES[hash] ? hash : '#pipeline'));
      });

      // Update hash without triggering hashchange
      if (window.location.hash !== h) history.replaceState(null, '', h);
    }

    // On load
    window.addEventListener('DOMContentLoaded', () => {
      navigate(window.location.hash || '#pipeline');
    });

    // On browser back/forward
    window.addEventListener('hashchange', () => {
      navigate(window.location.hash);
    });
  </script>

</body>
</html>
